name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v4

      - name: RUFF
        uses: astral-sh/ruff-action@v3

      - name: Tests
        run: python3 -m unittest discover -v -s sbom/lib -p "test_*.py"

      - name: Cmd Graph Based Kernel Build
        run: |
          # Generate linux-cmd directory and validate that the kernel can be compiled using only source files referenced in the cmd graph.
          python3 sbom_analysis/cmd_graph_based_kernel_build/cmd_graph_based_kernel_build.py
          cd linux-cmd
          make defconfig O=kernel-build
          make -j$(nproc) O=kernel-build
