name: Build and Publish Devcontainer Images

on:
    push:
    workflow_dispatch:
        inputs:
            config:
                description: 'Name of the config to use for the make command to build the linux kernel'
                type: choice
                default: defconfig
                options:
                    - defconfig
                    - allyesconfig
                    - allmodconfig
                    - allnoconfig
                    - randconfig
                    - localmodconfig
                    - tinyconfig

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push image for defconfig
              run: |
                  docker build \
                    --build-arg CONFIG=defconfig \
                    -f .devcontainer/Dockerfile \
                    -t ghcr.io/tng/kernel-sbom-devcontainer:defconfig .

                  docker push ghcr.io/tng/kernel-sbom-devcontainer:defconfig
